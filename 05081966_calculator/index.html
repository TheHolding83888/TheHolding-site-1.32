<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Калькулятор владельца — 05081966.eth</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Manrope:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: #08090C; }
  body { min-height: 100vh; min-height: 100dvh; background: radial-gradient(140% 90% at 50% -10%, #171A23 0%, #0B0D12 55%, #08090C 100%); color: #F2EEE6; font-family: 'Manrope', sans-serif; display: flex; justify-content: center; padding: 18px 10px 24px; }
  .wrap { width: 100%; max-width: 680px; display: flex; flex-direction: column; gap: 16px; }
  .head { display: flex; flex-direction: column; gap: 4px; align-items: center; text-align: center; }
  .brand { font-size: 11px; font-weight: 600; letter-spacing: 0.32em; text-transform: uppercase; color: rgba(242,238,230,0.5); }
  h1 { font-family: 'Cormorant Garamond', serif; font-weight: 500; font-size: 30px; line-height: 1.1; margin: 2px 0 0; }
  h1 em { font-style: italic; color: #D2AF6D; }
  .sub { font-size: 13px; font-weight: 300; line-height: 1.45; margin: 2px 0 0; color: rgba(242,238,230,0.55); max-width: 460px; }
  .inputRow { display: flex; align-items: center; gap: 14px; border: 1px solid #D2AF6D; border-radius: 18px; background: linear-gradient(135deg, rgba(210,175,109,0.12), rgba(210,175,109,0.04)); padding: 10px 20px; }
  .usd { font-family: 'Cormorant Garamond', serif; font-size: 34px; line-height: 1; color: #D2AF6D; }
  input { flex: 1; min-width: 0; background: transparent; border: none; outline: none; font-family: 'Cormorant Garamond', serif; font-size: 38px; line-height: 1; color: #F2EEE6; }
  input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
  input[type=number] { -moz-appearance: textfield; appearance: textfield; }
  .inputLabel { font-size: 10px; font-weight: 500; letter-spacing: 0.15em; text-transform: uppercase; color: rgba(242,238,230,0.5); text-align: right; line-height: 1.35; }
  .table { display: flex; flex-direction: column; gap: 8px; }
  .row { border-radius: 16px; padding: 13px 18px; display: flex; flex-direction: column; gap: 9px; }
  .rowTop { display: flex; justify-content: space-between; align-items: baseline; gap: 12px; }
  .name { font-size: 13px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; line-height: 1.2; }
  .mult { font-family: 'Cormorant Garamond', serif; font-size: 21px; opacity: 0.85; white-space: nowrap; }
  .vals { display: grid; grid-template-columns: 1.15fr 1fr 0.85fr; gap: 12px; }
  .cellLabel { font-size: 10px; font-weight: 600; letter-spacing: 0.14em; text-transform: uppercase; color: rgba(242,238,230,0.42); margin-bottom: 2px; }
  .val { font-family: 'Cormorant Garamond', serif; font-size: clamp(20px, 6vw, 27px); line-height: 1.1; white-space: nowrap; overflow: hidden; }
  .note { font-size: 11px; font-weight: 300; line-height: 1.5; margin: 0; color: rgba(242,238,230,0.38); text-align: center; }
  a { color: #D2AF6D; text-decoration: none; }
  @media (min-width: 480px) {
    h1 { font-size: 36px; }
    .name { font-size: 14px; }
    .row { padding: 16px 24px; }
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="head">
    <div class="brand">Digital Company</div>
    <h1>Калькулятор владельца <em>05081966.eth</em></h1>
    <p class="sub">Введи сумму пополнения — и увидишь разброс по пяти сценариям на дистанции 3–5+ лет.</p>
  </div>
  <div class="inputRow">
    <div class="usd">$</div>
    <input id="amount" type="number" min="0" inputmode="numeric" value="300">
    <div class="inputLabel">сумма<br>пополнения</div>
  </div>
  <div class="table" id="rows"></div>
  <p class="note">Ориентиры, а не гарантии. Поток — из ориентира 4–8+% годовых на текущий капитал.</p>
</div>
<script>
(function () {
  var dim = 'rgba(242,238,230,0.55)', mid = 'rgba(242,238,230,0.78)', gold = '#D2AF6D', bright = '#E8CF9B';
  var scenarios = [
    { name: 'Негативный', mult: '−2–3×', capLo: 1/3, capHi: 0.5, capPlus: false, flow: false,
      border: '1px solid rgba(242,238,230,0.12)', bg: 'rgba(242,238,230,0.02)', color: dim, num: dim },
    { name: 'Нейтральный', mult: '1×', capLo: 1, capHi: 1, single: true, flow: true,
      border: '1px solid rgba(242,238,230,0.12)', bg: 'rgba(242,238,230,0.02)', color: mid, num: mid },
    { name: 'Умеренно позитивный', mult: '10–20×', capLo: 10, capHi: 20, capPlus: true, flow: true,
      border: '1px solid rgba(210,175,109,0.4)', bg: 'rgba(210,175,109,0.05)', color: gold, num: gold },
    { name: 'Позитивный', mult: '30–80×', capLo: 30, capHi: 80, capPlus: true, flow: true,
      border: '1px solid #D2AF6D', bg: 'linear-gradient(135deg,rgba(210,175,109,0.12),rgba(210,175,109,0.04))', color: gold, num: bright },
    { name: 'Ультра позитивный', mult: '100–200×', capLo: 100, capHi: 200, capPlus: true, flow: true,
      border: '1px solid #E8CF9B', bg: 'linear-gradient(135deg,rgba(232,207,155,0.18),rgba(210,175,109,0.06))', color: bright, num: bright }
  ];
  function fmt(n) {
    var d = n >= 1e6 ? 1e6 : n >= 1000 ? 1e3 : 1;
    var v = n / d, r = v >= 100 ? Math.round(v) : Math.round(v * 10) / 10;
    if (r >= 1000 && d === 1e3) { d = 1e6; v = n / d; r = Math.round(v * 10) / 10; }
    return { v: String(r).replace('.', ','), u: d === 1e6 ? ' млн' : d === 1e3 ? ' тыс' : '' };
  }
  function f(n) { var x = fmt(n); return x.v + x.u; }
  function rng(lo, hi, plus) {
    var H = fmt(hi), tail = plus ? '+' : '';
    var hd = H.u === ' млн' ? 1e6 : H.u === ' тыс' ? 1e3 : 1;
    var lv = lo / hd, lr = lv >= 100 ? Math.round(lv) : Math.round(lv * 10) / 10;
    return '$' + String(lr).replace('.', ',') + '–' + H.v + H.u + tail;
  }
  function render() {
    var a = Math.max(0, Number(document.getElementById('amount').value) || 0);
    var out = '';
    scenarios.forEach(function (s) {
      var cap = s.single ? '$' + f(a) : rng(a * s.capLo, a * s.capHi, !!s.capPlus);
      var yr = s.flow ? rng(a * s.capLo * 0.04, a * s.capHi * 0.08, true) : '$0';
      var mo = s.flow ? rng(a * s.capLo * 0.04 / 12, a * s.capHi * 0.08 / 12, true) : '$0';
      out += '<div class="row" style="border:' + s.border + ';background:' + s.bg + '">' +
        '<div class="rowTop"><div class="name" style="color:' + s.color + '">' + s.name + '</div>' +
        '<div class="mult" style="color:' + s.color + '">' + s.mult + '</div></div>' +
        '<div class="vals">' +
        '<div><div class="cellLabel">Капитал</div><div class="val" style="color:' + s.num + '">' + cap + '</div></div>' +
        '<div><div class="cellLabel">Поток / год</div><div class="val" style="color:' + s.num + '">' + yr + '</div></div>' +
        '<div><div class="cellLabel">/ мес</div><div class="val" style="color:' + s.num + '">' + mo + '</div></div>' +
        '</div></div>';
    });
    document.getElementById('rows').innerHTML = out;
    fitAll();
  }
  document.getElementById('amount').addEventListener('input', render);
  window.addEventListener('resize', fitAll);
  function fitAll() {
    document.querySelectorAll('.val').forEach(function (el) {
      el.style.fontSize = ''; el.style.whiteSpace = ''; el.style.overflow = '';
      var size = parseFloat(getComputedStyle(el).fontSize);
      while (el.scrollWidth > el.clientWidth && size > 15) {
        size -= 0.5;
        el.style.fontSize = size + 'px';
      }
      if (el.scrollWidth > el.clientWidth) { el.style.whiteSpace = 'normal'; el.style.overflow = 'visible'; }
    });
  }
  render();
})();
</script>
</body>
</html>
