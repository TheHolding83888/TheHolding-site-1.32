<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Калькулятор владельца — 05081966.eth</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Manrope:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: #08090C; }
  body { min-height: 100vh; background: radial-gradient(140% 90% at 50% -10%, #171A23 0%, #0B0D12 55%, #08090C 100%); color: #F2EEE6; font-family: 'Manrope', sans-serif; display: flex; justify-content: center; padding: 44px 20px 64px; }
  .wrap { width: 100%; max-width: 640px; display: flex; flex-direction: column; gap: 32px; }
  .head { display: flex; flex-direction: column; gap: 12px; align-items: center; text-align: center; }
  .brand { font-size: 13px; font-weight: 600; letter-spacing: 0.34em; text-transform: uppercase; color: rgba(242,238,230,0.5); }
  .ens { font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 32px; line-height: 1.1; color: #D2AF6D; }
  h1 { font-family: 'Cormorant Garamond', serif; font-weight: 500; font-size: 42px; line-height: 1.08; margin: 0; }
  .sub { font-size: 17px; font-weight: 300; line-height: 1.55; margin: 0; color: rgba(242,238,230,0.65); max-width: 480px; }
  .inputRow { display: flex; align-items: center; gap: 18px; border: 1px solid #D2AF6D; border-radius: 22px; background: linear-gradient(135deg, rgba(210,175,109,0.12), rgba(210,175,109,0.04)); padding: 18px 26px; }
  .usd { font-family: 'Cormorant Garamond', serif; font-size: 42px; line-height: 1; color: #D2AF6D; }
  input { flex: 1; min-width: 0; background: transparent; border: none; outline: none; font-family: 'Cormorant Garamond', serif; font-size: 46px; line-height: 1; color: #F2EEE6; }
  input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
  input[type=number] { -moz-appearance: textfield; appearance: textfield; }
  .inputLabel { font-size: 12px; font-weight: 500; letter-spacing: 0.16em; text-transform: uppercase; color: rgba(242,238,230,0.5); text-align: right; line-height: 1.4; }
  .rows { display: flex; flex-direction: column; gap: 12px; }
  .card { border-radius: 18px; padding: 18px 22px; display: flex; flex-direction: column; gap: 12px; }
  .cardTop { display: flex; justify-content: space-between; align-items: baseline; gap: 14px; }
  .cardName { font-size: 14px; font-weight: 600; letter-spacing: 0.16em; text-transform: uppercase; }
  .cardMult { font-family: 'Cormorant Garamond', serif; font-size: 25px; white-space: nowrap; }
  .grid3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
  .cellLabel { font-size: 11px; font-weight: 600; letter-spacing: 0.14em; text-transform: uppercase; color: rgba(242,238,230,0.4); margin-bottom: 3px; }
  .cellVal { font-family: 'Cormorant Garamond', serif; font-size: 23px; line-height: 1.15; }
  .note { font-size: 13px; font-weight: 300; line-height: 1.55; margin: 0; color: rgba(242,238,230,0.4); text-align: center; }
  a { color: #D2AF6D; text-decoration: none; }
  @media (max-width: 420px) {
    h1 { font-size: 36px; }
    input { font-size: 40px; }
    .grid3 { grid-template-columns: 1fr 1fr; }
    .cellVal { font-size: 21px; }
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="head">
    <div class="brand">Digital Company</div>
    <div class="ens">05081966.eth</div>
    <h1>Калькулятор владельца</h1>
    <p class="sub">Захочешь пополнить баланс Компании — введи сумму и увидишь разброс по всем пяти сценариям на дистанции 3–5+ лет.</p>
  </div>
  <div class="inputRow">
    <div class="usd">$</div>
    <input id="amount" type="number" min="0" inputmode="numeric" value="300">
    <div class="inputLabel">сумма<br>пополнения</div>
  </div>
  <div class="rows" id="rows"></div>
  <p class="note">Ориентиры, а не гарантии. Денежный поток — из ориентира 4–8+% годовых на текущий капитал. Горизонт 3–5+ лет.</p>
</div>
<script>
(function () {
  var dim = 'rgba(242,238,230,0.55)', mid = 'rgba(242,238,230,0.78)', gold = '#D2AF6D', bright = '#E8CF9B';
  var scenarios = [
    { name: 'Негативный', mult: '−2–3×', capLo: 1/3, capHi: 0.5, capPlus: false, flow: false,
      border: '1px solid rgba(242,238,230,0.12)', bg: 'rgba(242,238,230,0.02)', color: dim, num: dim },
    { name: 'Нейтральный', mult: '1×', capLo: 1, capHi: 1, single: true, flow: true,
      border: '1px solid rgba(242,238,230,0.12)', bg: 'rgba(242,238,230,0.02)', color: mid, num: mid },
    { name: 'Умеренно позитивный', mult: '10–20×', capLo: 10, capHi: 20, capPlus: true, flow: true,
      border: '1px solid rgba(210,175,109,0.4)', bg: 'rgba(210,175,109,0.05)', color: gold, num: gold },
    { name: 'Позитивный', mult: '30–80×', capLo: 30, capHi: 80, capPlus: true, flow: true,
      border: '1px solid #D2AF6D', bg: 'linear-gradient(135deg,rgba(210,175,109,0.12),rgba(210,175,109,0.04))', color: gold, num: bright },
    { name: 'Ультра позитивный', mult: '100–200×', capLo: 100, capHi: 200, capPlus: true, flow: true,
      border: '1px solid #E8CF9B', bg: 'linear-gradient(135deg,rgba(232,207,155,0.18),rgba(210,175,109,0.06))', color: bright, num: bright }
  ];
  function f(n) {
    if (n >= 1e6) { var v = n / 1e6; return (v % 1 ? v.toFixed(1).replace('.', ',') : v) + ' млн'; }
    if (n >= 10000) return Math.round(n / 1000) + ' тыс';
    return String(Math.round(n)).replace(/\B(?=(\d{3})+(?!\d))/g, ' ');
  }
  function rng(lo, hi, plus) { return '$' + f(lo) + '–' + f(hi) + (plus ? '+' : ''); }
  function cell(label, val, color) {
    return '<div><div class="cellLabel">' + label + '</div><div class="cellVal" style="color:' + color + '">' + val + '</div></div>';
  }
  function render() {
    var a = Math.max(0, Number(document.getElementById('amount').value) || 0);
    var out = '';
    scenarios.forEach(function (s) {
      var cap = s.single ? '$' + f(a) : rng(a * s.capLo, a * s.capHi, !!s.capPlus);
      var yr = s.flow ? rng(a * s.capLo * 0.04, a * s.capHi * 0.08, true) : '$0';
      var mo = s.flow ? rng(a * s.capLo * 0.04 / 12, a * s.capHi * 0.08 / 12, true) : '$0';
      out += '<div class="card" style="border:' + s.border + ';background:' + s.bg + '">' +
        '<div class="cardTop"><div class="cardName" style="color:' + s.color + '">' + s.name + '</div>' +
        '<div class="cardMult" style="color:' + s.color + '">' + s.mult + '</div></div>' +
        '<div class="grid3">' + cell('Капитал', cap, s.num) + cell('Поток / год', yr, s.num) + cell('Поток / мес', mo, s.num) + '</div></div>';
    });
    document.getElementById('rows').innerHTML = out;
  }
  document.getElementById('amount').addEventListener('input', render);
  render();
})();
</script>
</body>
</html>
